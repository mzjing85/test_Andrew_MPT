name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pywebview

      - name: Build macOS app
        run: |
          pyinstaller --noconfirm --onedir --windowed \
            --name "IntervalTrainer" \
            --collect-all webview \
            --hidden-import=webview \
            gui.py

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          cp -R dist/IntervalTrainer.app dist/dmg/
          hdiutil create \
            -volname "IntervalTrainer" \
            -srcfolder dist/dmg \
            -ov \
            -format UDZO \
            dist/IntervalTrainer.dmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/IntervalTrainer.dmg
          retention-days: 1

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller pywebview

      - name: Build Windows executable
        shell: bash
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name "IntervalTrainer" \
            --collect-all webview \
            --hidden-import=webview \
            gui.py

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/IntervalTrainer.exe
          retention-days: 1

  create-release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: ./artifacts/mac

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: ./artifacts/windows

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./artifacts/mac/IntervalTrainer.dmg
            ./artifacts/windows/IntervalTrainer.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}